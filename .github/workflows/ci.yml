name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          files="$(gofmt -l ./cmd ./internal)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -trimpath -ldflags "-s -w -X main.version=ci" ./cmd/pamie

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            VERSION=ci
